<!DOCTYPE html>
<!--
  Based on template by Prof. Yuseon Park
  Hongik University, Design Research Studio, 2026
  Extended with: Airtable API fetch, masonry grid, hover overlay, pointer drag-to-swap
-->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장판 모아보기 — 장판 아카이브</title>
  <meta name="description" content="An archive of fake wood-grain flooring units collected from Korean residential and commercial product lines." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&family=Fleur+De+Leah&family=Rouge+Script&family=Mea+Culpa&family=Lobster&family=Gravitas+One&family=Ultra&family=Noto+Sans:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

  <section class="works">
    <div id="grid"></div>
  </section>

  <div id="loading">loading…</div>
  <div id="error" style="display:none"></div>

  <!-- Click hint -->
  <div id="click-hint">
    <span>click anywhere to reveal</span>
  </div>

  <!-- Download button -->
  <button id="download-btn" title="내 장판 다운로드" aria-label="Download Viewport">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="7 10 12 15 17 10" />
      <line x1="12" y1="15" x2="12" y2="3" />
    </svg>
  </button>

  <script>
    // ─────────────────────────────────────────────────────────────
    // Config
    // ─────────────────────────────────────────────────────────────
    const AIRTABLE_TOKEN  = "patMrJnngETB8Srn9.2291fafcbf0c5009f6cd1bb0fb76f64a4186e03dc379d4ef282b70acd6ed3dea";
    const AIRTABLE_BASE   = "app0gYEl62r82qDqK";
    const AIRTABLE_TABLE  = "css용 시트";

    const FIELDS = {
      nameKo:    "장판 이름 (한글)",
      nameEn:    "장판 이름 (영어)",
      image:     "사진",
      unitSize:  "나무판 무늬 유닛 1개 크기",
      maxRepeat: "똑같은 디자인이 반복되지 않는 최대 크기",
      density:   "단위무늬당 유닛 밀도",
      pattern:   "제조사에서 말하는 무늬 특징",
      thickness: "두께",
      softness:  "푹신함? 단단함?",
      purpose:   "장판의 목적",
      series:    "장판 시리즈 이름",
      brand:     "출시 회사",
    };

    // State: whether we've revealed the wood or not
    let isRevealed = false;

    // ─────────────────────────────────────────────────────────────
    // Compute font size so each word fills the tile width,
    // then return the total height needed.
    // Each word is on its own line (stacked via <br>).
    // ─────────────────────────────────────────────────────────────
    function fitText(containerW, text, fontFamily) {
      const words = text.split(/\s+/);
      const hPad = 16;           // breathing room left+right
      const vPad = 20;           // breathing room top+bottom
      const targetW = containerW - hPad;
      const ff = fontFamily;

      // Measure each word individually with nowrap
      const span = document.createElement("span");
      span.style.cssText = `
        position:absolute; left:-9999px; top:-9999px; visibility:hidden;
        font-family:${ff}; line-height:1.1;
        text-transform:capitalize; letter-spacing:-0.01em;
        white-space:nowrap; display:inline-block; padding:0;
      `;
      document.body.appendChild(span);

      // For each word, find the largest font-size that fits targetW
      // Then pick the MINIMUM across all words so they all fit.
      let minFontSize = 300;

      for (const word of words) {
        span.textContent = word;
        let lo = 10, hi = 300, best = lo;
        while (lo <= hi) {
          const mid = Math.floor((lo + hi) / 2);
          span.style.fontSize = mid + "px";
          if (span.offsetWidth <= targetW) {
            best = mid;
            lo = mid + 1;
          } else {
            hi = mid - 1;
          }
        }
        minFontSize = Math.min(minFontSize, best);
      }

      // Now measure total height at that font size (all words stacked)
      span.style.fontSize = minFontSize + "px";
      let totalH = 0;
      for (const word of words) {
        span.textContent = word;
        totalH += span.offsetHeight;
      }

      document.body.removeChild(span);

      const fontSize = Math.max(10, minFontSize);
      const height = totalH + vPad;
      return { fontSize, height };
    }

    // ─────────────────────────────────────────────────────────────
    // Build a single card element
    // ─────────────────────────────────────────────────────────────
    function buildCard(record, index) {
      const f = record.fields;
      const name = f[FIELDS.nameEn] || f[FIELDS.nameKo] || "—";

      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = record.id;
      
      // Store data for averaging during download
      card.dataset.density = f[FIELDS.density] || "";
      card.dataset.thickness = f[FIELDS.thickness] || "";
      card.dataset.softness = f[FIELDS.softness] || "";
      card.dataset.series = f[FIELDS.series] || "";

      // Image wrap (also hosts hover overlay)
      const imgWrap = document.createElement("div");
      imgWrap.className = "card-img-wrap";
      
      const imageAttachments = f[FIELDS.image];
      let imgUrl = "";

      // Pick a font family for this card — mix of cursive & heavy serif
      const fonts = [
        "'Monsieur La Doulaise', cursive",
        "'Gravitas One', serif",
        "'Fleur De Leah', cursive",
        "'Ultra', serif",
        "'Rouge Script', cursive",
        "'Lobster', cursive",
        "'Mea Culpa', cursive",
      ];
      const fontChoice = fonts[index % fonts.length];
      
      if (imageAttachments && imageAttachments.length > 0) {
        imgUrl = imageAttachments[0].url;
        
        // Hidden image (shown on reveal)
        const img = document.createElement("img");
        img.src     = imgUrl;
        img.crossOrigin = "anonymous";
        img.alt     = name;
        img.loading = "lazy";
        img.className = "card-wood-img";
        imgWrap.appendChild(img);

        // Text layer with wood texture fill
        const textLayer = document.createElement("div");
        textLayer.className = "card-text-layer";
        
        const textEl = document.createElement("span");
        textEl.className = "card-name-text";
        // One word per line — no orphans
        textEl.innerHTML = name.split(/\s+/).map(w => {
          const d = document.createElement("span");
          d.textContent = w;
          return d.outerHTML;
        }).join("<br>");
        textEl.dataset.rawName = name; // keep for measurement
        textEl.style.backgroundImage = `url(${imgUrl})`;
        textEl.style.fontFamily = fontChoice;
        textEl.dataset.font = fontChoice; // Store for measurement
        
        textLayer.appendChild(textEl);
        imgWrap.appendChild(textLayer);
        
      } else {
        const randomH = Math.floor(Math.random() * 100) + 320;
        const hue = Math.floor(Math.random() * 360);
        const sat = Math.floor(Math.random() * 40) + 30;
        const lit = Math.floor(Math.random() * 40) + 40;
        imgWrap.style.height = `${randomH}px`;
        imgWrap.style.backgroundColor = `hsl(${hue}, ${sat}%, ${lit}%)`;

        const label = document.createElement("span");
        label.className = "placeholder-label";
        label.textContent = "—";
        imgWrap.appendChild(label);
      }

      // Hover overlay — ALL info lives here only
      const overlay = document.createElement("div");
      overlay.className = "card-overlay";

      const rows = [
        { label: "한국어명",  value: f[FIELDS.nameKo] },
        { label: "시리즈",    value: f[FIELDS.series] },
        { label: "용도",      value: f[FIELDS.purpose] },
        { label: "유닛 크기", value: f[FIELDS.unitSize] },
        { label: "반복 최대", value: f[FIELDS.maxRepeat] },
        { label: "밀도",      value: f[FIELDS.density] },
        { label: "두께",      value: f[FIELDS.thickness] },
        { label: "푹신함",    value: f[FIELDS.softness] },
        { label: "무늬 특징", value: f[FIELDS.pattern] },
      ].filter(r => r.value);

      overlay.innerHTML = `
        <p class="overlay-title">${name}</p>
        ${f[FIELDS.brand] ? `<p class="overlay-brand">${f[FIELDS.brand]}</p>` : ""}
        ${rows.length > 0 ? `<dl>${rows.map(r => `<dt>${r.label}</dt><dd>${r.value}</dd>`).join("")}</dl>` : ""}
      `;

      imgWrap.appendChild(overlay);
      card.appendChild(imgWrap);

      return card;
    }

    // ─────────────────────────────────────────────────────────────
    // Compute font sizes → set tile heights to match text
    // ─────────────────────────────────────────────────────────────
    function adjustFontSizes() {
      const cards = document.querySelectorAll(".card");
      cards.forEach(card => {
        const textEl = card.querySelector(".card-name-text");
        if (!textEl) return;

        const wrap = card.querySelector(".card-img-wrap");
        const w = wrap.offsetWidth;
        if (w === 0) return;

        const name = textEl.dataset.rawName || textEl.textContent;
        const ff = textEl.dataset.font;
        const { fontSize, height } = fitText(w, name, ff);

        textEl.style.fontSize = fontSize + "px";
        wrap.style.height = height + "px";
        // Sync background-size so wood grain fills the text shape
        textEl.style.backgroundSize = `${w}px ${height}px`;
      });
    }

    // ─────────────────────────────────────────────────────────────
    // Toggle: click to switch between fancy-text and plain-wood
    // ─────────────────────────────────────────────────────────────
    function toggleReveal() {
      isRevealed = !isRevealed;
      document.body.classList.toggle("revealed", isRevealed);

      const hint = document.getElementById("click-hint");
      if (hint) {
        if (isRevealed) hint.classList.add("hidden");
        else hint.classList.remove("hidden");
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Custom pointer-event drag-to-SWAP
    // Works with CSS columns masonry by using element swapping
    // ─────────────────────────────────────────────────────────────
    function initDragSwap(grid) {
      let dragSrc = null;
      let clone   = null;
      let startX  = 0, startY = 0;
      let cloneOffX = 0, cloneOffY = 0;

      // Create floating clone element (appended to body)
      function createClone(card) {
        const rect = card.getBoundingClientRect();
        const c = card.cloneNode(true);
        c.id = "drag-clone";
        c.style.width  = rect.width  + "px";
        c.style.height = rect.height + "px";
        c.style.left   = rect.left   + "px";
        c.style.top    = rect.top    + "px";
        // Hide overlay on clone
        const ov = c.querySelector(".card-overlay");
        if (ov) ov.style.opacity = "0";
        document.body.appendChild(c);
        return c;
      }

      function moveClone(e) {
        if (!clone) return;
        const cx = (e.clientX ?? e.touches?.[0]?.clientX) - cloneOffX;
        const cy = (e.clientY ?? e.touches?.[0]?.clientY) - cloneOffY;
        clone.style.left = cx + "px";
        clone.style.top  = cy + "px";
      }

      function cardUnder(e) {
        // Temporarily hide clone so elementFromPoint works
        if (clone) clone.style.display = "none";
        const x = e.clientX ?? e.touches?.[0]?.clientX;
        const y = e.clientY ?? e.touches?.[0]?.clientY;
        const el = document.elementFromPoint(x, y);
        if (clone) clone.style.display = "";
        return el?.closest(".card");
      }

      function swapCards(a, b) {
        if (!a || !b || a === b) return;
        // In a DOM without flex/grid order, we swap nodes directly
        const parentA = a.parentNode;
        const parentB = b.parentNode;
        const nextA   = a.nextSibling;
        const nextB   = b.nextSibling;

        if (parentA === parentB) {
          if (nextA === b) {
            parentA.insertBefore(b, a);
          } else if (nextB === a) {
            parentB.insertBefore(a, b);
          } else {
            if (nextA) parentA.insertBefore(b, nextA);
            else parentA.appendChild(b);
            if (nextB) parentB.insertBefore(a, nextB);
            else parentB.appendChild(a);
          }
        }
      }

      // ── Pointer events ───────────────────────────────────────
      grid.addEventListener("pointerdown", e => {
        // Only primary button / touch
        if (e.pointerType === "mouse" && e.button !== 0) return;

        const card = e.target.closest(".card");
        if (!card) return;

        // Ignore clicks on overlay links etc.
        const rect = card.getBoundingClientRect();
        startX = e.clientX;
        startY = e.clientY;
        cloneOffX = e.clientX - rect.left;
        cloneOffY = e.clientY - rect.top;

        let dragStarted = false;
        const THRESHOLD = 6; // px before drag activates

        function onMove(ev) {
          const dx = ev.clientX - startX;
          const dy = ev.clientY - startY;

          if (!dragStarted && Math.sqrt(dx*dx + dy*dy) < THRESHOLD) return;

          if (!dragStarted) {
            dragStarted = true;
            dragSrc = card;
            card.classList.add("card-dragging");
            clone = createClone(card);
          }

          ev.preventDefault();
          moveClone(ev);

          // Highlight potential swap target
          const target = cardUnder(ev);
          grid.querySelectorAll(".card-ghost").forEach(c => c.classList.remove("card-ghost"));
          if (target && target !== dragSrc) target.classList.add("card-ghost");
        }

        function onUp(ev) {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup",   onUp);

          if (dragStarted) {
            const target = cardUnder(ev);
            if (target && target !== dragSrc) {
              swapCards(dragSrc, target);
            }
            dragSrc.classList.remove("card-dragging");
            grid.querySelectorAll(".card-ghost").forEach(c => c.classList.remove("card-ghost"));
            clone?.remove();
            clone   = null;
            dragSrc = null;
          } else {
            // Simple click → toggle text / wood
            toggleReveal();
          }
        }

        window.addEventListener("pointermove", onMove, { passive: false });
        window.addEventListener("pointerup",   onUp);
      });

      // Also listen on body for clicks outside the grid
      document.body.addEventListener("click", (e) => {
        if (!e.target.closest(".card") && !e.target.closest("#download-btn")) {
          toggleReveal();
        }
      });

      // Prevent context menu on long-press mobile
      grid.addEventListener("contextmenu", e => {
        if (dragSrc) e.preventDefault();
      });
    }

    // ─────────────────────────────────────────────────────────────
    // Fetch from Airtable
    // ─────────────────────────────────────────────────────────────
    async function fetchAirtable() {
      const url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${encodeURIComponent(AIRTABLE_TABLE)}?pageSize=100`;
      const res = await fetch(url, {
        headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
      });
      if (!res.ok) throw new Error(`Airtable error ${res.status}`);
      const data = await res.json();
      return data.records;
    }

    // ─────────────────────────────────────────────────────────────
    // Main
    // ─────────────────────────────────────────────────────────────
    async function init() {
      const grid    = document.getElementById("grid");
      const loading = document.getElementById("loading");
      const errEl   = document.getElementById("error");

      function updateExportTag() {
        let tag = document.getElementById("export-tag");
        if (!tag) {
          tag = document.createElement("div");
          tag.id = "export-tag";
          document.body.appendChild(tag);
        }

        const visibleCards = Array.from(grid.querySelectorAll(".card")).filter(card => {
          const rect = card.getBoundingClientRect();
          return rect.top < window.innerHeight && rect.bottom > 0;
        });

        if (visibleCards.length > 0) {
          const mode = (arr) => {
            const counts = {};
            let maxCount = 0, maxItem = "—";
            arr.forEach(item => {
              if (!item) return;
              counts[item] = (counts[item] || 0) + 1;
              if (counts[item] > maxCount) {
                maxCount = counts[item]; maxItem = item;
              }
            });
            return maxItem;
          };

          let totalThick = 0, countThick = 0;
          const softnesses = [], densities = [], series = [];

          visibleCards.forEach(c => {
            const t = parseFloat(c.dataset.thickness);
            if (!isNaN(t)) { totalThick += t; countThick++; }
            if (c.dataset.softness) softnesses.push(c.dataset.softness);
            if (c.dataset.density) densities.push(c.dataset.density);
            if (c.dataset.series) series.push(c.dataset.series);
          });

          const avgThick = countThick > 0 ? (totalThick / countThick).toFixed(1) + "mm" : "—";
          const modeSoft = mode(softnesses);
          const modeDens = mode(densities);
          const modeSeri = mode(series);

          tag.innerHTML = `
            <div class="tag-header">
              <span class="tag-title">나의 장판 모음</span>
              <span class="tag-id">MIX ${Date.now().toString().slice(-6)}</span>
            </div>
            <div class="tag-body">
              <div class="tag-row"><strong>평균 두께</strong> <span>${avgThick}</span></div>
              <div class="tag-row"><strong>주요 푹신함</strong> <span>${modeSoft}</span></div>
              <div class="tag-row"><strong>주요 밀도</strong> <span>${modeDens}</span></div>
              <div class="tag-row"><strong>주요 시리즈</strong> <span>${modeSeri}</span></div>
            </div>
          `;
        }
      }

      const dlBtn = document.getElementById("download-btn");
      dlBtn.addEventListener("mouseenter", () => {
        updateExportTag();
        const tag = document.getElementById("export-tag");
        if (tag) tag.classList.add("show");
      });
      dlBtn.addEventListener("mouseleave", () => {
        const tag = document.getElementById("export-tag");
        if (tag) tag.classList.remove("show");
      });

      dlBtn.addEventListener("click", async (e) => {
        e.stopPropagation(); // Don't trigger reveal
        dlBtn.style.display = "none";
        
        const tag = document.getElementById("export-tag");
        if (tag) {
          tag.classList.add("show"); // Ensure visible during capture
          tag.style.transition = "none"; // Disable fade for instant capture
        }

        try {
          const canvas = await html2canvas(document.body, {
            y: window.scrollY,
            x: 0,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: "#0a0a0a",
            useCORS: true,
            scale: 2
          });
          const link = document.createElement("a");
          link.download = `jangpan-collection-${Date.now()}.jpg`;
          link.href = canvas.toDataURL("image/jpeg", 0.95);
          link.click();
        } catch (err) {
          console.error("Screenshot failed:", err);
          alert("다운로드 중 오류가 발생했습니다.");
        }
        
        dlBtn.style.display = "flex";
        if (tag) {
          tag.classList.remove("show");
          tag.style.transition = "";
        }
      });

      try {
        const records = await fetchAirtable();

        loading.style.display = "none";

        records.forEach((record, i) => {
          if (!record.fields[FIELDS.nameEn] && !record.fields[FIELDS.nameKo]) return;
          grid.appendChild(buildCard(record, i));
        });

        // Measure immediately (system fonts), then re-measure
        // once web fonts finish loading for pixel-perfect fit
        adjustFontSizes();
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(() => adjustFontSizes());
        }
        // Safety fallback
        setTimeout(adjustFontSizes, 3500);
        
        // Re-adjust on resize
        window.addEventListener("resize", () => {
          adjustFontSizes();
        });

        initDragSwap(grid);

      } catch (err) {
        loading.style.display = "none";
        errEl.style.display   = "block";
        errEl.innerHTML = `
          <strong>데이터를 불러오지 못했습니다.</strong><br>
          ${err.message}<br><br>
          ① Airtable token과 base ID를 확인하세요<br>
          ② Live Server 또는 GitHub Pages에서 실행하세요 (file:// 불가)
        `;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
